services:
  ingest-server:
    image: ghcr.io/pallandos/ingest:latest
    ports:
      - "8080:8080"
    environment:
      LISTEN_ADDR: ":8080"
      DATA_DIR: "/data"
    volumes:
      - ./data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"